services:
  db:
    image: postgres:16
    container_name: hotel_bookings_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel_admin
      POSTGRES_PASSWORD: hotel_pass
      POSTGRES_DB: hotel_bookings
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_admin -d hotel_bookings"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
