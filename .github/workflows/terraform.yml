name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra

      # NOTE: This assessment does not require an actual AWS deployment.
      # `terraform init` here uses `-backend=false` so it works without any
      # AWS credentials or a pre-created S3/DynamoDB backend, and is enough
      # to validate provider/module wiring. If you want a real `plan`
      # against your AWS account, add AWS credentials as repo secrets
      # (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY) and switch the init
      # step below to a full `terraform init` (no -backend=false).
      - name: Terraform init (no backend, offline-friendly)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Configure AWS credentials
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform plan
        id: plan
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform plan -refresh=false -input=false -no-color | tee plan_output.txt

      - name: Upload plan as workflow artifact
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: actions/upload-artifact@v4
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        with:
          name: terraform-plan-${{ matrix.env }}
          path: infra/envs/${{ matrix.env }}/plan_output.txt

      - name: Comment plan on PR
        if: ${{ github.event_name == 'pull_request' && env.AWS_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/envs/${{ matrix.env }}/plan_output.txt';
            const plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No plan output found';
            const body = `#### Terraform Plan — \`${{ matrix.env }}\`\n<details><summary>Show plan</summary>\n\n\`\`\`\n${plan.slice(0, 60000)}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
